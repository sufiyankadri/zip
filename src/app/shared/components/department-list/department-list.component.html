<section class="department-section">
  <div class="section-head"><h2>{{ title() }}</h2><p>{{ subtitle() }}</p></div>
  @if (homeEnhanced()) {
    <div class="department-list top-grid">
      @for (department of topDepartments(); track department.id) {
        <button type="button" class="department-card" (click)="departmentSelect.emit(department)">
          <div class="dept-icon-wrap"><span class="material-symbols-outlined">account_balance</span></div>
          <div class="dept-info"><h3>{{ department.name }}</h3><p>{{ department.description }}</p></div>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </button>
      }

      @if (moreDepartments().length > 0) {
        <article class="department-card more-grid-card" aria-label="More departments">
          <div class="more-grid-viewport no-scrollbar">
            <div class="more-grid-track">
              @for (department of moreDepartments(); track department.id) {
                <button type="button" class="more-item-tile" (click)="departmentSelect.emit(department)">
                  <span class="material-symbols-outlined">account_balance</span>
                  <p>{{ department.name }}</p>
                </button>
              }
            </div>
          </div>
          <div class="more-label">
            <button type="button" class="more-cta" (click)="viewAll.emit()">सभी सेवाएं →</button>
          </div>
        </article>
      }
    </div>
  } @else {
    <div class="department-list">
      @for (department of departments(); track department.id) {
        <button type="button" class="department-card" (click)="departmentSelect.emit(department)">
          <div class="dept-icon-wrap"><span class="material-symbols-outlined">account_balance</span></div>
          <div class="dept-info"><h3>{{ department.name }}</h3><p>{{ department.description }}</p></div>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </button>
      }
    </div>
  }
</section>
