<section class="quick-section">
  <div class="section-head"><h2>त्वरित कार्रवाई</h2></div>
  <div class="quick-grid">
    @for (action of actions(); track action.id) {
      <button type="button" class="quick-tile" [class.active]="selectedAction() === action.action" (click)="toggle(action.action)">
        <span class="tile-icon"><span class="material-symbols-outlined">{{ action.icon }}</span></span>
        <p class="label">{{ action.label }}</p>
        <p class="count">{{ getCount(action.action) }}</p>
      </button>
    }
  </div>
</section>
