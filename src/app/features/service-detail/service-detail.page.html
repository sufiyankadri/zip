<div class="detail-page">
  <app-top-header
    [showBack]="true"
    title="सेवा विवरण"
    subtitle="Apply, Track and Download"
  />

  @if (service()) {
    <section class="hero-section">
      <h1>{{ service()!.serviceName }}</h1>
      <div class="hero-meta">
        <span class="badge mode">{{ service()!.mode }}</span>
        @if (service()!.samagraEnabled) {
          <span class="badge samagra">समग्र</span>
        }
      </div>
    </section>

    <app-service-detail-sections [service]="service()!" />

    <div class="sticky-actions">
      <button type="button" class="action-btn primary">
        <span class="material-symbols-outlined">arrow_forward</span>
        आगे बढ़ें
      </button>
    </div>
  } @else {
    <section class="not-found">
      <span class="material-symbols-outlined">error_outline</span>
      <h2>सेवा नहीं मिली</h2>
      <p>कृपया वापस जाएं और सही सेवा चुनें।</p>
    </section>
  }
</div>
